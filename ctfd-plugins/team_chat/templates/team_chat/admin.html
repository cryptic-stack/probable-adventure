{% extends "admin/base.html" %}
{% block content %}
<div class="jumbotron"><div class="container"><h1>Team Chat</h1></div></div>
<div class="container" id="team-chat-admin-root">
  <div class="d-flex mb-3">
    <select id="tc-room-filter" class="form-control mr-2" style="max-width: 320px;">
      <option value="">All Rooms</option>
    </select>
    <button id="tc-refresh" type="button" class="btn btn-outline-primary">Refresh</button>
    <button id="tc-purge-room" type="button" class="btn btn-outline-danger ml-2">Purge Room</button>
  </div>
  <div id="tc-status" class="text-muted mb-2"></div>
  <div class="table-responsive">
    <table class="table table-striped border">
      <thead>
        <tr>
          <th>ID</th>
          <th>Room</th>
          <th>User</th>
          <th>Text</th>
          <th>Created</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tc-body"><tr><td colspan="6" class="text-center text-muted">Loading...</td></tr></tbody>
    </table>
  </div>
</div>
{% endblock %}
