worker_processes 1;

events {
  worker_connections 1024;
}

http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  resolver 127.0.0.11 ipv6=off valid=10s;

  upstream ctfd_app {
    server ctfd:8000;
  }

  server {
    listen 80;
    client_max_body_size 64m;

    location = /admin/plugins/runtime/admin {
      return 302 /plugins/runtime/admin;
    }

    location ~ ^/terminal/([0-9]+)/([A-Za-z0-9_-]+)/?(.*)$ {
      set $challenge_id $1;
      set $session_id $2;
      set $terminal_path $3;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_buffering off;
      proxy_pass http://ctfd-challenge-$challenge_id-session-$session_id-lab:7681/$terminal_path$is_args$args;
    }

    location ~ ^/desktop/([0-9]+)/([A-Za-z0-9_-]+)/([0-9]+)/?(.*)$ {
      set $challenge_id $1;
      set $session_id $2;
      set $internal_port $3;
      set $desktop_path $4;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_buffering off;
      proxy_pass http://ctfd-challenge-$challenge_id-session-$session_id-lab:$internal_port/$desktop_path$is_args$args;
    }

    # Optional direct CTFd path alias.
    location /ctfd/ {
      rewrite ^/ctfd/(.*)$ /$1 break;
      proxy_pass http://ctfd_app;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
      proxy_pass http://ctfd_app;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
