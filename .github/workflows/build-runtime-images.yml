name: Build Runtime Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-runtime-images.yml"
      - "images/**"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: lab-base
            context: ./images/lab-base
            image: ghcr.io/${{ github.repository_owner }}/probable-adventure-lab-base
          - id: challenge-fileshare
            context: ./images/challenge-fileshare
            image: ghcr.io/${{ github.repository_owner }}/probable-adventure-challenge-fileshare
          - id: kali-terminal
            context: ./images/kali-terminal
            image: ghcr.io/${{ github.repository_owner }}/probable-adventure-kali-terminal
          - id: forensics-terminal
            context: ./images/forensics-terminal
            image: ghcr.io/${{ github.repository_owner }}/probable-adventure-forensics-terminal
          - id: windows-rdp
            context: ./images/windows-rdp
            image: ghcr.io/${{ github.repository_owner }}/probable-adventure-windows-rdp
          - id: ubuntu-xfce-desktop
            context: ./images/ubuntu-xfce-desktop
            image: ghcr.io/${{ github.repository_owner }}/probable-adventure-ubuntu-xfce-desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push ${{ matrix.id }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
